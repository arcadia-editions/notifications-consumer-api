asyncapi: 3.0.0
info:
  title: "Arcadia Editions - Notifications Consumer"
  version: 0.0.1
  tags:
    - name: "Default"
    - name: "NotificationsConsumer"

defaultContentType: application/json

channels:
  PaymentCapturedEventsChannel:
    address: "payments-processing.events.payment-captured"
    messages:
      SendOrderConfirmationInputMessage:
        $ref: '#/components/messages/SendOrderConfirmationInputMessage'
  StockUnavailableEventsChannel:
    address: "catalog-inventory.events.stock-unavailable"
    messages:
      SendStockUnavailableNotificationInputMessage:
        $ref: '#/components/messages/SendStockUnavailableNotificationInputMessage'
  OrderCancelledEventsChannel:
    address: "orders-checkout.events.order-cancelled"
    messages:
      SendOrderCancelledNotificationInputMessage:
        $ref: '#/components/messages/SendOrderCancelledNotificationInputMessage'
  OrderConfirmationSentEventsChannel:
    address: "notifications-consumer.events.order-confirmation-sent"
    messages:
      OrderConfirmationSentMessage:
        $ref: '#/components/messages/OrderConfirmationSentMessage'
  NotificationDeliveryFailedEventsChannel:
    address: "notifications-consumer.events.notification-delivery-failed"
    messages:
      NotificationDeliveryFailedMessage:
        $ref: '#/components/messages/NotificationDeliveryFailedMessage'
  StockUnavailableNotificationSentEventsChannel:
    address: "notifications-consumer.events.stock-unavailable-notification-sent"
    messages:
      StockUnavailableNotificationSentMessage:
        $ref: '#/components/messages/StockUnavailableNotificationSentMessage'
  OrderCancelledNotificationSentEventsChannel:
    address: "notifications-consumer.events.order-cancelled-notification-sent"
    messages:
      OrderCancelledNotificationSentMessage:
        $ref: '#/components/messages/OrderCancelledNotificationSentMessage'

operations:
  doSendOrderConfirmation:
    action: receive
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/PaymentCapturedEventsChannel'
  doSendStockUnavailableNotification:
    action: receive
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/StockUnavailableEventsChannel'
  doSendOrderCancelledNotification:
    action: receive
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/OrderCancelledEventsChannel'
  onOrderConfirmationSent:
    action: send
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/OrderConfirmationSentEventsChannel'
  onNotificationDeliveryFailed:
    action: send
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/NotificationDeliveryFailedEventsChannel'
  onStockUnavailableNotificationSent:
    action: send
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/StockUnavailableNotificationSentEventsChannel'
  onOrderCancelledNotificationSent:
    action: send
    tags:
      - name: NotificationsConsumer
    channel:
      $ref: '#/channels/OrderCancelledNotificationSentEventsChannel'


components:
  messages:
    SendOrderConfirmationInputMessage:
      name: SendOrderConfirmationInputMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/SendOrderConfirmationInput.avsc"
    SendStockUnavailableNotificationInputMessage:
      name: SendStockUnavailableNotificationInputMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/SendStockUnavailableNotificationInput.avsc"
    SendOrderCancelledNotificationInputMessage:
      name: SendOrderCancelledNotificationInputMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/SendOrderCancelledNotificationInput.avsc"
    OrderConfirmationSentMessage:
      name: OrderConfirmationSentMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/OrderConfirmationSent.avsc"
    StockUnavailableNotificationSentMessage:
      name: StockUnavailableNotificationSentMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/StockUnavailableNotificationSent.avsc"
    OrderCancelledNotificationSentMessage:
      name: OrderCancelledNotificationSentMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/OrderCancelledNotificationSent.avsc"
    NotificationDeliveryFailedMessage:
      name: NotificationDeliveryFailedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/NotificationDeliveryFailed.avsc"

  messageTraits:
    CommonHeaders:
      headers:
        type: object
        properties:
          kafka_messageKey:
            type: "integer"
            format: "int64"
            description: This header value will be populated automatically at runtime
            x-runtime-expression: $message.payload#/id
          # CloudEvents Attributes
          ce-id:
            type: string
            description: Unique identifier for the event
            x-runtime-expression: $message.payload#{#this.id}
          ce-source:
            type: string
            description: URI identifying the context where event happened
            x-runtime-expression: $message.payload#{"NotificationsConsumer"}
          ce-specversion:
            type: string
            description: CloudEvents specification version
            x-runtime-expression: $message.payload#{"1.0"}
          ce-type:
            type: string
            description: Event type
            x-runtime-expression: $message.payload#{#this.getClass().getSimpleName()}
          ce-time:
            type: string
            description: Timestamp of when the event happened
            x-runtime-expression: $message.payload#{T(java.time.Instant).now().toString()}


